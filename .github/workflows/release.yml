name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-22.04
          - os: linux
            arch: arm64
            runner: ubuntu-22.04
          - os: macos
            arch: x86_64
            runner: macos-13
          - os: macos
            arch: arm64
            runner: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Install cross-compiler (Linux arm64)
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted universe" | sudo tee /etc/apt/sources.list.d/arm64.list
          sudo apt-get update
          sudo apt-get install -y libssl-dev:arm64

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Build (Linux x86_64)
        if: matrix.os == 'linux' && matrix.arch == 'x86_64'
        run: make LDFLAGS="-lcrypto -static"

      - name: Build (Linux arm64)
        if: matrix.os == 'linux' && matrix.arch == 'arm64'
        run: |
          make CXX=aarch64-linux-gnu-g++ \
               CXXFLAGS="-Wall -pedantic -Wno-long-long -O2 -std=c++11 -I/usr/include/aarch64-linux-gnu" \
               LDFLAGS="-L/usr/lib/aarch64-linux-gnu -lcrypto -static"

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          OPENSSL_PREFIX=$(brew --prefix openssl@3)
          make CXXFLAGS="-Wall -pedantic -Wno-long-long -O2 -std=c++11 -I${OPENSSL_PREFIX}/include" \
               LDFLAGS="-L${OPENSSL_PREFIX}/lib -lcrypto"

      - name: Package binary
        run: |
          ARTIFACT_NAME="git-crypt-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}"
          cp git-crypt "${ARTIFACT_NAME}"
          sha256sum "${ARTIFACT_NAME}" > "${ARTIFACT_NAME}.sha256" || shasum -a 256 "${ARTIFACT_NAME}" > "${ARTIFACT_NAME}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-crypt-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            git-crypt-${{ github.ref_name }}-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums file
        run: |
          cat *.sha256 > checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            git-crypt-*
            checksums-sha256.txt
